server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sportsclub
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: sportsClubSecretKey2024VeryLongSecretKeyForJWTTokenGeneration123456789
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.sportsclub: INFO
    org.springframework.security: WARN
